  <!-- Main Visualizer -->
  <script type="module">
    // Flashcards data (portuguese to english vocabulary)
    const vocabulary = [
      { en: "Library", pt: "Biblioteca", pronunciation: "/ˈlaɪbrəri/" },
      { en: "Education", pt: "Educação", pronunciation: "/ˌedʒuˈkeɪʃn/" },
      { en: "Knowledge", pt: "Conhecimento", pronunciation: "/ˈnɔlɪdʒ/" },
      { en: "Student", pt: "Aluno/Aprendiz", pronunciation: "/ˈstjuːdənt/" }
    ];
    
    // Main Vocab visualizer - renders HTML cards with gradient backgrounds
    function renderMainVocab(level, quests) {
      let html = `
<div style="font-family: system-ui, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);">
  
  <!-- Header -->
  <header style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: clamp(0.75rem, 2vw, 1rem); color: white; position: sticky; top: 0; z-index: 50; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
    <div style="max-width: 900px; margin: 0 auto; padding: 0 1rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; font-size: clamp(0.875rem, 3vw, 1rem);">
        <strong>Vocabulário</strong>
        <span style="background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 0.75rem; font-size: 0.875rem;">${quests} missões completas</span>
      </div>
      <!-- Level indicator -->
      <div style="margin-top: 0.5rem;">Nível ${level.name}</div>
    </div>
  </header>
`;
      
      // Main content with cards
      html += `
  <!-- Flashcard container -->
  <main style="max-width: 900px; margin: 0 auto; padding: 1rem;">
    <div id="cards-container" style="display: grid; gap: 1rem; padding: 2rem;"></div>
  </main>
`;;
      
      // Footer with XP info
      html += `
  <!-- Footer -->
  <footer style="padding: 1rem; text-align: center; color: #475569;">
    Level Progress: ${level?.exp} / ${level?.nextLevel || '∞'} XP
  </footer>
  
</div>
`;
      
      // Add individual cards
      vocabulary.forEach((word, index) => {
        html += `
<div style="background: white; border-radius: 1rem; padding: clamp(0.75rem, 3vw, 1.25rem); box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;">
  <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: clamp(0.75rem, 2vw, 1rem); border-radius: 0.75rem; margin-bottom: 1rem;">
    <div style="font-size: clamp(1.25rem, 5vw, 2rem); font-weight: bold;">${word.en}</div>
  </div>
  
  <h3 style="margin: 0 0 0.75rem; color: #334155; font-size: clamp(1.125rem, 4vw, 1.5rem);">
    ${word.pt}
  </h3>
  
  <div style="background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); padding: 1rem; border-radius: 0.75rem; color: #1e40af;">
    Pronúncia: <span style="font-family: monospace;">${word.pronunciation}</span>
  </div>
  
  <div style="margin-top: 1rem; font-size: 0.875rem; color: #64748b;">
    Exercício de vocabulário - associe o conceito em português com sua forma em inglês
  </div>
</div>`.trim();
      });
      
      return html.trim();
    }
    
    // Export as template literal for direct HTML injection
    const mainVocabTemplate = (levelName, currentLevel, exp, nextLevel) => {

    };
    
    // Main component that loads on page
    console.log('%c⚡ Vocabulário App Loaded', 'background: #667eea; color: white; padding: 1rem; border-radius: 0.25rem;');
    console.log('Use Graphify para renderizar cards com gradientes azul-indigo');
    
  </script>
</body>
</html>
