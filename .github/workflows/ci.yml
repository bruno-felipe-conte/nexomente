name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npx eslint app/src/ --max-warnings 0 || true
        # "|| true" enquanto há warnings legados — remover após Fase 3 completa

      - name: Test
        run: npm run test:run

      - name: Build (Vite only — sem Electron no CI)
        run: npx vite build
        env:
          VITE_APP_ENV: production
          VITE_LLM_BASE_URL: http://localhost:1234/v1

      - name: Coverage report
        run: npm run test:coverage
        continue-on-error: true
        # Remover continue-on-error quando coverage atingir threshold definido
